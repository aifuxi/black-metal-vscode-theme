name: Publish Marketplace

on:
  release:
    types:
      - published

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Validate release metadata
        env:
          RELEASE_PRERELEASE: ${{ github.event.release.prerelease }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          if [ "$RELEASE_PRERELEASE" = "true" ]; then
            echo "Refusing to publish from a GitHub prerelease."
            exit 1
          fi

          PACKAGE_VERSION="$(node -p "require('./package.json').version")"

          if [ "$RELEASE_TAG" != "$PACKAGE_VERSION" ]; then
            echo "Release tag $RELEASE_TAG does not match package.json version $PACKAGE_VERSION."
            exit 1
          fi

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Run tests
        run: npm test

      - name: Publish to VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          if [ -z "$VSCE_PAT" ]; then
            echo "VSCE_PAT secret is required."
            exit 1
          fi

          npx @vscode/vsce publish
